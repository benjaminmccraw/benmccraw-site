const ITER = 250000;
async function decrypt(pw){
  const raw = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
  const salt = raw.slice(0,16);
  const iv = raw.slice(16,28);
  const authTag = raw.slice(28,44);
  const ct = raw.slice(44);
  const ctTag = new Uint8Array(ct.length + authTag.length);
  ctTag.set(ct); ctTag.set(authTag, ct.length);
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:ITER, hash:'SHA-256'},
    baseKey,
    {name:'AES-GCM', length:256},
    false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ctTag);
  return new TextDecoder().decode(plain);
}
const f = document.getElementById('f');
const pwEl = document.getElementById('pw');
const errEl = document.getElementById('err');
const gate = document.getElementById('gate');
const content = document.getElementById('content');
const btn = f.querySelector('button');
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Unlocking…';
  try {
    const html = await decrypt(pwEl.value);
    // Render decrypted content
    content.innerHTML = html;
    gate.classList.add('hide');
    content.classList.add('show');
    // Re-execute any scripts in the decrypted HTML
    content.querySelectorAll('script').forEach(s => {
      const ns = document.createElement('script');
      [...s.attributes].forEach(a => ns.setAttribute(a.name, a.value));
      ns.textContent = s.textContent;
      s.replaceWith(ns);
    });
    document.title = "Church Answers — Proposal";
  } catch (err) {
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Unlock';
    pwEl.select();
  }
});
